services:
  web:
    build: .
    container_name: foodz_web
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=foodz_user
      - DB_PASSWORD=foodz_password
      - DB_NAME=foodz_db
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: foodz_db_container
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: foodz_db
      MYSQL_USER: foodz_user
      MYSQL_PASSWORD: foodz_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
